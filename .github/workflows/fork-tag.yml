name: Internal CI

on:
  push:
    branches:
      - main-fork/merged
      - wip-2.3
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG_PREFIX: "v2.3.0-alpha.dmcg."

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        go-version: ["1.25.8", "1.26.1"]
        exclude:
          - os: ${{ github.event.repository.private && 'ubuntu-24.04-arm' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/install-go
        with:
          go-version: ${{ matrix.go-version }}
      - name: Make
        run: |
          make build
          make binaries

  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Determine next tag and push
        run: |
          PREFIX="${TAG_PREFIX}"
          LAST=$(git tag -l "${PREFIX}*" | sed "s/^${PREFIX}//" | sort -n | tail -1)
          NEXT=$(( ${LAST:-0} + 1 ))
          NEW_TAG="${PREFIX}${NEXT}"
          echo "Creating tag: ${NEW_TAG}"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"
