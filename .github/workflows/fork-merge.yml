name: Merge Fork PRs

on:
  push:
    branches:
      - main-fork
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG_PREFIX: "v2.3.0-alpha.dmcg."

jobs:
  merge:
    name: Merge PRs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Rewrite SSH URLs to HTTPS and use gh as credential helper
          # so the merge script can fetch PRs (works for private repos too)
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          gh auth setup-git

      - name: Merge PRs from list
        run: contrib/merge-prs.sh

      - name: Push staging branch
        run: git push --force origin HEAD:refs/heads/main-fork-stage

  lint:
    name: Lint
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork-stage
      - uses: ./.github/actions/install-go
        with:
          go-version: "1.26.1"
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.9.0
          args: --timeout=8m

  test:
    name: Unit tests
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork-stage
      - uses: ./.github/actions/install-go
        with:
          go-version: "1.26.1"
      - name: Test
        run: make test

  build:
    name: Build
    needs: merge
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        go-version: ["1.25.8", "1.26.1"]
        exclude:
          - os: ${{ github.event.repository.private && 'ubuntu-24.04-arm' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork-stage
      - uses: ./.github/actions/install-go
        with:
          go-version: ${{ matrix.go-version }}
      - name: Make
        run: |
          make build
          make binaries

  promote:
    name: Promote and tag
    runs-on: ubuntu-latest
    needs: [lint, test, build]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main-fork-stage
          fetch-tags: true
          fetch-depth: 0

      - name: Push branch and tag
        run: |
          git push --force origin HEAD:refs/heads/main-fork-merged

          PREFIX="${TAG_PREFIX}"
          LAST=$(git tag -l "${PREFIX}*" | sed "s/^${PREFIX}//" | sort -n | tail -1)
          NEXT=$(( ${LAST:-0} + 1 ))
          NEW_TAG="${PREFIX}${NEXT}"
          echo "Creating tag: ${NEW_TAG}"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"
